.screen {
  position: relative;
  width: 1080px;
  height: 2400px;
  overflow: hidden;
  background: #e7ecec;
}
.underlay {
  position: absolute;
  inset: 0;
  width: 1080px;
  height: 2400px;

}
.poster {
  position: absolute;
  left: 0;

.layer {

  inset: 0;

  height: 1920px;

.edge-veils {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
